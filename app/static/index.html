<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Evidence Note Annotator</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <!-- ================= Top bar ================= -->
  <header id="topbar">
    <div class="brand">
      <span class="logo">◆</span>
      <span>Evidence Note Annotator</span>
    </div>
    <div id="paper-switcher">
      <select id="paper-select" title="切换论文 (Ctrl/⌘+P)"></select>
    </div>
    <div id="progress-wrap">
      <div id="progress-bar"><div id="progress-fill"></div></div>
      <span id="progress-label">—</span>
    </div>
    <div class="topbar-actions">
      <span id="save-state" class="save-state" title="自动保存状态">已保存</span>
      <button id="btn-undo" class="btn ghost" title="撤销 (Ctrl/⌘+Z)">↶</button>
      <button id="btn-redo" class="btn ghost" title="重做 (Ctrl/⌘+Shift+Z)">↷</button>
      <select id="task-status" class="task-status" title="任务状态">
        <option value="not_started">未开始</option>
        <option value="in_progress">进行中</option>
        <option value="submitted">已提交</option>
      </select>
      <button id="btn-export" class="btn primary" title="导出标注结果">导出</button>
      <button id="btn-help" class="btn ghost" title="快捷键 (?)">?</button>
    </div>
  </header>

  <!-- ================= Three-panel body ================= -->
  <main id="workspace">
    <!-- LEFT: source + evidence -->
    <section id="pane-source" class="pane">
      <div class="pane-head">
        <div class="tabs" id="source-tabs">
          <button class="tab active" data-tab="source">证据原文</button>
          <button class="tab" data-tab="knowledge">知识摘要</button>
        </div>
        <div class="pane-head-right">
          <span id="evidence-status" class="evidence-status"></span>
        </div>
      </div>
      <div id="source-scroll" class="pane-body">
        <div id="source-blocks"></div>
        <div id="knowledge-view" class="hidden"></div>
      </div>
    </section>

    <div class="divider" id="divider-1"></div>

    <!-- CENTER: buckets + fields -->
    <section id="pane-fields" class="pane">
      <div class="pane-head">
        <div class="field-toolbar">
          <input id="field-search" type="search" placeholder="搜索字段 / 值…  (/)" />
          <select id="filter-status" title="按状态筛选">
            <option value="">全部状态</option>
            <option value="unprocessed">未处理</option>
            <option value="confirmed">已确认</option>
            <option value="modified">已修改</option>
            <option value="needs_review">待复核</option>
            <option value="conflict">冲突</option>
            <option value="added">已补充</option>
            <option value="no_evidence">缺证据</option>
          </select>
        </div>
      </div>
      <div id="bucket-rail" class="bucket-rail"></div>
      <div id="fields-scroll" class="pane-body">
        <div id="fields-list"></div>
      </div>
    </section>

    <div class="divider" id="divider-2"></div>

    <!-- RIGHT: inspector -->
    <aside id="pane-inspector" class="pane">
      <div class="pane-head"><span class="pane-title">字段详情</span></div>
      <div id="inspector-body" class="pane-body">
        <div class="inspector-empty">选择一个字段以查看证据、置信度与编辑选项。</div>
      </div>
    </aside>
  </main>

  <!-- ================= Legend footer ================= -->
  <footer id="legend"></footer>

  <!-- ================= Help modal ================= -->
  <div id="help-modal" class="modal hidden">
    <div class="modal-card">
      <div class="modal-head"><span>快捷键 & 状态说明</span><button id="help-close" class="btn ghost">✕</button></div>
      <div class="modal-body" id="help-body"></div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
